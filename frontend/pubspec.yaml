name: bike_news_room
description: "Bike News Room — cycling news aggregator (web frontend)."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7
  dio: ^5.7.0
  dartz: ^0.10.1
  get_it: ^8.0.3
  google_fonts: ^6.2.1
  go_router: ^14.6.2
  shared_preferences: ^2.3.3
  url_launcher: ^6.3.1
  share_plus: ^11.1.0
  intl: ^0.20.1
  cupertino_icons: ^1.0.8
  # ── Mobile-only: ads + consent + tracking permission ──
  # All wired behind the four-layer flutter-ads-consent pattern. Disabled
  # on web via per-platform guards in the service layer.
  google_mobile_ads: ^5.3.1
  app_tracking_transparency: ^2.0.6+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/catalogue/watchlist_seed.json
    - assets/catalogue/cycling_sources.json
