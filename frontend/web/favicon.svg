<?xml version="1.0" encoding="UTF-8"?>
<!--
  Spoked-O brand mark — browser-tab variant.

  Browser tabs render favicons at 16×16 against varied chromes; a dark-on-
  dark icon disappears on dark themes. This SVG uses the brand's accent
  yellow as the background (matches scripts/generate_brand_icons.py output
  for favicon.png / favicon-16.png) so the wheel is recognisable on any
  tab strip — light or dark, Chrome / Safari / Firefox.

  PWA / launcher icons (icons/Icon-*.png) keep the dark-on-dark treatment
  to match the in-app brand mark.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Sodium-yellow tile (#E8C54A) -->
  <rect width="64" height="64" rx="12" fill="#E8C54A"/>
  <!-- Bold dark wheel rim -->
  <circle cx="32" cy="32" r="22" stroke="#2A220D" stroke-width="5" />
  <!-- 3 diameters → 6 visible spokes (clearer at 16×16 than 8) -->
  <line x1="10" y1="32" x2="54" y2="32" stroke="#2A220D" stroke-width="4" stroke-linecap="round"/>
  <line x1="32" y1="10" x2="32" y2="54" stroke="#2A220D" stroke-width="4" stroke-linecap="round"/>
  <line x1="16.2" y1="16.2" x2="47.8" y2="47.8" stroke="#2A220D" stroke-width="4" stroke-linecap="round"/>
  <!-- Hub -->
  <circle cx="32" cy="32" r="5" fill="#2A220D" />
</svg>
