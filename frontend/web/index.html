<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Bike News Room — cycling news aggregator. All bike racing news in one feed.">
  <meta name="theme-color" content="#0E0F11">

  <!--
    Content Security Policy — tuned for Flutter Web (CanvasKit renderer).
      script-src: 'self' for our bundle; 'wasm-unsafe-eval' for the dart2wasm
        runtime; www.gstatic.com hosts Flutter's CanvasKit engine
        (canvaskit.js / canvaskit.wasm).
      connect-src: same trio — CanvasKit + icudtl.dat are XHR-fetched from
        www.gstatic.com — plus our HF Space API.
      img-src: 'self' for striped placeholders, https: for third-party article
        thumbnails (RSS feeds host across many CDNs), data:/blob: for inline.
      style-src: 'unsafe-inline' required by Flutter inline style attrs.
      frame-ancestors 'none' — never embeddable in a third-party iframe.
      Single-line because newlines in <meta> CSP can confuse parsers.
  -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval' https://www.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; connect-src 'self' https://*.hf.space https://www.gstatic.com https://fonts.googleapis.com https://fonts.gstatic.com; worker-src 'self' blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta name="referrer" content="no-referrer">

  <!-- Open Graph -->
  <meta property="og:title" content="Bike News Room">
  <meta property="og:description" content="Cycling news aggregator. All bike racing in one news room.">
  <meta property="og:type" content="website">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Bike News Room">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon — SVG first (modern browsers, infinitely scalable),
       size-specific PNGs for older browsers. The `?v=2` query string is a
       cache-bust: browsers cache favicons aggressively and would otherwise
       keep showing the old (or default Flutter) icon for hours. -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg?v=2"/>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png?v=2"/>
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png?v=2"/>

  <title>Bike News Room</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
