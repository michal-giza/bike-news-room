<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Bike News Room — cycling news aggregator. All bike racing news in one feed.">
  <meta name="theme-color" content="#0E0F11">

  <!--
    Content Security Policy.
      script-src: 'self' for our bundle; 'wasm-unsafe-eval' is required by
        Flutter Web's Skia/CanvasKit + dart2wasm runtime.
      connect-src: 'self' plus the API origin (HF Space) — replace at deploy
        time, or make this header injection your CDN's job for finer control.
      img-src: 'self' (placeholders) plus https: for any remote article image.
      font-src: 'self' plus Google Fonts hosts (we ship Newsreader / Inter Tight / JetBrains Mono via google_fonts).
      style-src: 'unsafe-inline' is required by Flutter (inline style attrs).
      frame-ancestors 'none' — never embeddable in a third-party iframe.
  -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' 'wasm-unsafe-eval';
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
    font-src 'self' https://fonts.gstatic.com;
    img-src 'self' data: https:;
    connect-src 'self' https://*.hf.space https://fonts.googleapis.com https://fonts.gstatic.com;
    frame-ancestors 'none';
    base-uri 'self';
    form-action 'self';
  ">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta name="referrer" content="no-referrer">

  <!-- Open Graph -->
  <meta property="og:title" content="Bike News Room">
  <meta property="og:description" content="Cycling news aggregator. All bike racing in one news room.">
  <meta property="og:type" content="website">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Bike News Room">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Bike News Room</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
