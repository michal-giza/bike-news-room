name: bike_news_room
description: "Bike News Room — cycling news aggregator (web frontend)."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7
  dio: ^5.7.0
  dartz: ^0.10.1
  get_it: ^8.0.3
  google_fonts: ^6.2.1
  go_router: ^14.6.2
  shared_preferences: ^2.3.3
  url_launcher: ^6.3.1
  share_plus: ^11.1.0
  intl: ^0.20.1
  cupertino_icons: ^1.0.8
  # ── Mobile-only: ads + consent + tracking permission ──
  # All wired behind the four-layer flutter-ads-consent pattern. Disabled
  # on web via per-platform guards in the service layer.
  google_mobile_ads: ^5.3.1
  app_tracking_transparency: ^2.0.6+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  # integration_test + patrol drive the on-device scenario suite.
  # Patrol's `patrolWidgetTest` is a drop-in for `testWidgets` that
  # adds (a) locale-independent finders via `$(Key)`, (b) native
  # automator hooks for ATT / UMP / runtime-permission dialogs, and
  # (c) better timeout + retry semantics on real devices. We keep
  # `integration_test` as a transitive — `patrol` requires it.
  integration_test:
    sdk: flutter
  patrol: ^3.20.0
  # Generates the native iOS LaunchScreen.storyboard image set + the
  # Android launch_background drawable from a single config block.
  # Run `dart run flutter_native_splash:create` after editing the
  # `flutter_native_splash:` section below.
  flutter_native_splash: ^2.4.6
  flutter_lints: ^5.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

flutter_native_splash:
  # Centred brand mark on the dark tile that matches the in-app
  # background. The PWA's 512×512 maskable Icon-512.png is the same
  # asset we use for app icons + Android adaptive icons, so the
  # launch screen, app icon, and feed background read as one design.
  color: "#0E0F11"
  color_dark: "#0E0F11"
  image: "web/icons/Icon-512.png"
  image_dark: "web/icons/Icon-512.png"
  android_12:
    # Android 12+ has a separate splash mechanism (theme attr +
    # adaptive icon foreground). The icon foreground gets centred
    # and tinted; we use the maskable variant which already has
    # safe-zone padding baked in.
    color: "#0E0F11"
    color_dark: "#0E0F11"
    image: "web/icons/Icon-maskable-512.png"
    image_dark: "web/icons/Icon-maskable-512.png"

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/catalogue/watchlist_seed.json
    - assets/catalogue/cycling_sources.json
