<?xml version="1.0" encoding="UTF-8"?>
<!--
  Spoked-O brand mark — vector source. Identical geometry to the in-app
  BrandMark widget (lib/core/widgets/brand_mark.dart) and the PNG favicons
  generated by scripts/generate_brand_icons.py. Modern browsers prefer this
  over the rasterised .png at any zoom level.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <rect width="64" height="64" fill="#0E0F11"/>
  <circle cx="32" cy="32" r="26" stroke="#F6F4EE" stroke-width="3" />
  <!-- 4 diameter lines = 8 visible spoke segments -->
  <line x1="6"  y1="32" x2="58" y2="32" stroke="#F6F4EE" stroke-width="2" />
  <line x1="32" y1="6"  x2="32" y2="58" stroke="#F6F4EE" stroke-width="2" />
  <line x1="13.6" y1="13.6" x2="50.4" y2="50.4" stroke="#F6F4EE" stroke-width="2" />
  <line x1="50.4" y1="13.6" x2="13.6" y2="50.4" stroke="#F6F4EE" stroke-width="2" />
  <circle cx="32" cy="32" r="4" fill="#F6F4EE" />
</svg>
